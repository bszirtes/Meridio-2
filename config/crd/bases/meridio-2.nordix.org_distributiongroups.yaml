                      rule: self == oldSelf
                required:
                - maxEndpoints
                type: object
              parentRefs:
                description: |-
                  ParentRefs binds this group to specific Gateways for network context.
                  This provides the secondary network identity for the endpoints.
                items:
                  description: |-
                    ParentReference mirrors Gateway API's ParentReference
                    avoiding hard dependency towards the API.
                  properties:
                    group:
                      default: gateway.networking.k8s.io
                      description: Group is the API group of the referent.
                      type: string
                    kind:
                      default: Gateway
                      description: Kind is the type of the referent.
                      type: string
                    name:
                      description: Name is the name of the referent.
                      minLength: 1
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the referent. When unspecified, this refers
                        to the local namespace of the referer.
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 1
                type: array
                x-kubernetes-list-type: atomic
              selector:
                description: |-
                  Selector restricts connectivity to endpoints that match these labels.
                  This uses the standard Kubernetes LabelSelector, supporting both
                  matchLabels and matchExpressions.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              type:
                default: Maglev
                description: |-
                  Type determines how the DistributionGroup is distributed.
                  Defaults to Maglev. This is a discriminator for the config blocks below.
                enum:
                - Maglev
                type: string
            type: object
          status:
            description: |-
              Most recently observed status of the DistributionGroup.
              Populated by the system. Read-only.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the group's state.
                  Common types: "Ready", "Synchronized".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
        x-kubernetes-validations:
        - message: Type is immutable
          rule: oldSelf.spec.type == self.spec.type
        - message: maglev configuration can only be set when type is Maglev
          rule: 'self.spec.type == ''Maglev'' ? true : !has(self.spec.maglev)'
        - message: Only Kind 'Gateway' is supported as a parent reference
          rule: '!has(self.spec.parentRefs) || self.spec.parentRefs.all(p, p.kind
            == ''Gateway'')'
    served: true
