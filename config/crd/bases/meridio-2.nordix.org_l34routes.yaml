---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: l34routes.meridio-2.nordix.org
spec:
  group: meridio-2.nordix.org
  names:
    kind: L34Route
    listKind: L34RouteList
    plural: l34routes
    singular: l34route
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: L34Route is the Schema for the L34Routes API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of L34Route
            properties:
              backendRefs:
                description: |-
                  BackendRefs defines the backend(s) where matching requests should be
                  sent. If unspecified or invalid (refers to a non-existent resource or a
                  Service with no endpoints), the underlying implementation MUST actively
                  reject connection attempts to this backend. Connection rejections must
                  respect weight; if an invalid backend is requested to have 80% of
                  connections, then 80% of connections must be rejected instead.

                  Support: Core for Kubernetes Service

                  Support: Extended for Kubernetes ServiceImport

                  Support: Implementation-specific for any other resource

                  Support for weight: Extended
                items:
                  description: |-
                    BackendRef defines how a Route should forward a request to a Kubernetes
                    resource.

                    Note that when a namespace different than the local namespace is specified, a
                    ReferenceGrant object is required in the referent namespace to allow that
                    namespace's owner to accept the reference. See the ReferenceGrant
                    documentation for details.

                    <gateway:experimental:description>

                    When the BackendRef points to a Kubernetes Service, implementations SHOULD
                    honor the appProtocol field if it is set for the target Service Port.

                    Implementations supporting appProtocol SHOULD recognize the Kubernetes
                    Standard Application Protocols defined in KEP-3726.

                    If a Service appProtocol isn't specified, an implementation MAY infer the
                    backend protocol through its own means. Implementations MAY infer the
                    protocol from the Route type referring to the backend Service.

                    If a Route is not able to send traffic to the backend using the specified
                    protocol then the backend is considered invalid. Implementations MUST set the
                    "ResolvedRefs" condition to "False" with the "UnsupportedProtocol" reason.

                    </gateway:experimental:description>

                    Note that when the BackendTLSPolicy object is enabled by the implementation,
                    there are some extra rules about validity to consider here. See the fields
                    where this struct is used for more information about the exact behavior.
                  properties:
                    group:
                      default: ""
                      description: |-
                        Group is the group of the referent. For example, "gateway.networking.k8s.io".
                        When unspecified or empty string, core API group is inferred.
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      default: Service
                      description: |-
                        Kind is the Kubernetes resource kind of the referent. For example
                        "Service".

                        Defaults to "Service" when not specified.

                        ExternalName services can refer to CNAME DNS records that may live
                        outside of the cluster and as such are difficult to reason about in
                        terms of conformance. They also may not be safe to forward to (see
                        CVE-2021-25740 for more information). Implementations SHOULD NOT
                        support ExternalName Services.

                        Support: Core (Services with a type other than ExternalName)

                        Support: Implementation-specific (Services with type ExternalName)
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: Name is the name of the referent.
                      maxLength: 253
                      minLength: 1
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the backend. When unspecified, the local
                        namespace is inferred.

                        Note that when a namespace different than the local namespace is specified,
                        a ReferenceGrant object is required in the referent namespace to allow that
                        namespace's owner to accept the reference. See the ReferenceGrant
                        documentation for details.

                        Support: Core
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    port:
                      description: |-
                        Port specifies the destination port number to use for this resource.
                        Port is required when the referent is a Kubernetes Service. In this
                        case, the port number is the service port number, not the target port.
                        For other resources, destination port might be derived from the referent
                        resource or this field.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    weight:
                      default: 1
                      description: |-
                        Weight specifies the proportion of requests forwarded to the referenced
                        backend. This is computed as weight/(sum of all weights in this
                        BackendRefs list). For non-zero values, there may be some epsilon from
                        the exact proportion defined here depending on the precision an
                        implementation supports. Weight is not a percentage and the sum of
                        weights does not need to equal 100.

                        If only one backend is specified and it has a weight greater than 0, 100%
                        of the traffic is forwarded to that backend. If weight is set to 0, no
                        traffic should be forwarded for this entry. If unspecified, weight
                        defaults to 1.

                        Support for this field varies based on the context where used.
                      format: int32
                      maximum: 1000000
                      minimum: 0
                      type: integer
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: Must have port for Service reference
                    rule: '(size(self.group) == 0 && self.kind == ''Service'') ? has(self.port)
                      : true'
                maxItems: 1
                minItems: 1
                type: array
              byteMatches:
                description: ByteMatches matches bytes in the L4 header in the L34Route.
                items:
                  maxLength: 80
                  type: string
                maxItems: 10
                type: array
                x-kubernetes-validations:
                - message: each byteMatch must be a valid string
                  rule: 'self.all(byteMatch, byteMatch.matches("^(sctp|tcp|udp)\\[[0-9]+
                    *: *[124]\\]( *& *0x[0-9a-f]+)? *= *([0-9]+|0x[0-9a-f]+)$"))'
              destinationCIDRs:
                description: |-
                  Destination CIDRs that this L34Route will send traffic to.
                  It is interpreted by the implementation as the set of VIPs exposed by the Gateway.
                  The destination CIDRs should not have overlaps.
                  Each destinationCIDR must be an IPv4/32 or IPv6/128 CIDR
                items:
                  maxLength: 50
                  type: string
                maxItems: 100
                type: array
                x-kubernetes-validations:
                - message: each destinationCIDR must be an IPv4/32 or IPv6/128 CIDR
                  rule: self.all(c, isCIDR(c) && (cidr(c).prefixLength() == 32 ||
                    cidr(c).prefixLength() == 128))
              destinationPorts:
                description: |-
                  Destination port ranges allowed in the L34Route.
                  The ports should not have overlaps.
                  Ports can be defined by:
                  - a single port, such as 3000;
                  - a port range, such as 3000-4000;
                  - "any", which is equivalent to port range 0-65535.
                items:
                  maxLength: 11
                  type: string
                maxItems: 20
                type: array
                x-kubernetes-validations:
                - message: each destinationPort must be a single port, a port range,
                    or 'any'
                  rule: self.all(port, port == 'any' || (port.matches('^\\d+$') &&
                    int(port) >= 0 && int(port) <= 65535) || (port.matches('^\\d+-\\d+$')
                    && int(port.split('-')[0]) >= 0 && int(port.split('-')[0]) <=
                    65535 && int(port.split('-')[1]) >= 0 && int(port.split('-')[1])
                    <= 65535 && int(port.split('-')[0]) <= int(port.split('-')[1])))
              parentRefs:
                description: |-
                  ParentRefs specifies the Gateway in which the route will be configured.
                  Reference to gatewayapiv1.Gateway object.

                  A L34Route defines the set of VIP addresses that a Gateway must support,
                  so only a single parent Gateway is allowed. Reuse of an L34Route across
                  multiple Gateways is not supported, as VIP ownership would otherwise
                  become ambiguous.

                  Future extensions could consider allowing shared L34Routes, but (possibly)
                  only for Route objects that do not define destinationCIDRs.
                items:
                  description: |-
                    ParentReference identifies an API object (usually a Gateway) that can be considered
                    a parent of this resource (usually a route). There are two kinds of parent resources
                    with "Core" support:

                    * Gateway (Gateway conformance profile)
                    * Service (Mesh conformance profile, ClusterIP Services only)

                    This API may be extended in the future to support additional kinds of parent
                    resources.

                    The API object must be valid in the cluster; the Group and Kind must
                    be registered in the cluster for this reference to be valid.
                  properties:
                    group:
                      default: gateway.networking.k8s.io
                      description: |-
                        Group is the group of the referent.
                        When unspecified, "gateway.networking.k8s.io" is inferred.
                        To set the core API group (such as for a "Service" kind referent),
                        Group must be explicitly set to "" (empty string).

                        Support: Core
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      default: Gateway
                      description: |-
                        Kind is kind of the referent.

                        There are two kinds of parent resources with "Core" support:

                        * Gateway (Gateway conformance profile)
                        * Service (Mesh conformance profile, ClusterIP Services only)

                        Support for other resources is Implementation-Specific.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: |-
                        Name is the name of the referent.

                        Support: Core
                      maxLength: 253
                      minLength: 1
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the referent. When unspecified, this refers
                        to the local namespace of the Route.

                        Note that there are specific rules for ParentRefs which cross namespace
                        boundaries. Cross-namespace references are only valid if they are explicitly
                        allowed by something in the namespace they are referring to. For example:
                        Gateway has the AllowedRoutes field, and ReferenceGrant provides a
                        generic way to enable any other kind of cross-namespace reference.

                        <gateway:experimental:description>
                        ParentRefs from a Route to a Service in the same namespace are "producer"
                        routes, which apply default routing rules to inbound connections from
                        any namespace to the Service.

                        ParentRefs from a Route to a Service in a different namespace are
                        "consumer" routes, and these routing rules are only applied to outbound
                        connections originating from the same namespace as the Route, for which
                        the intended destination of the connections are a Service targeted as a
                        ParentRef of the Route.
                        </gateway:experimental:description>

                        Support: Core
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    port:
                      description: |-
                        Port is the network port this Route targets. It can be interpreted
                        differently based on the type of parent resource.

                        When the parent resource is a Gateway, this targets all listeners
                        listening on the specified port that also support this kind of Route(and
                        select this Route). It's not recommended to set `Port` unless the
                        networking behaviors specified in a Route must apply to a specific port
                        as opposed to a listener(s) whose port(s) may be changed. When both Port
                        and SectionName are specified, the name and port of the selected listener
                        must match both specified values.

                        <gateway:experimental:description>
                        When the parent resource is a Service, this targets a specific port in the
                        Service spec. When both Port (experimental) and SectionName are specified,
                        the name and port of the selected port must match both specified values.
                        </gateway:experimental:description>

                        Implementations MAY choose to support other parent resources.
                        Implementations supporting other types of parent resources MUST clearly
                        document how/if Port is interpreted.

                        For the purpose of status, an attachment is considered successful as
                        long as the parent resource accepts it partially. For example, Gateway
                        listeners can restrict which Routes can attach to them by Route kind,
                        namespace, or hostname. If 1 of 2 Gateway listeners accept attachment
                        from the referencing Route, the Route MUST be considered successfully
                        attached. If no Gateway listeners accept attachment from this Route,
                        the Route MUST be considered detached from the Gateway.

                        Support: Extended
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    sectionName:
                      description: |-
                        SectionName is the name of a section within the target resource. In the
                        following resources, SectionName is interpreted as the following:

                        * Gateway: Listener name. When both Port (experimental) and SectionName
                        are specified, the name and port of the selected listener must match
                        both specified values.
                        * Service: Port name. When both Port (experimental) and SectionName
                        are specified, the name and port of the selected listener must match
                        both specified values.

                        Implementations MAY choose to support attaching Routes to other resources.
                        If that is the case, they MUST clearly document how SectionName is
                        interpreted.

                        When unspecified (empty string), this will reference the entire resource.
                        For the purpose of status, an attachment is considered successful if at
                        least one section in the parent resource accepts it. For example, Gateway
                        listeners can restrict which Routes can attach to them by Route kind,
                        namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from
                        the referencing Route, the Route MUST be considered successfully
                        attached. If no Gateway listeners accept attachment from this Route, the
                        Route MUST be considered detached from the Gateway.

                        Support: Core
                      maxLength: 253
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 1
                minItems: 1
                type: array
              priority:
                description: |-
                  Priority of the L34Route
                  Multiple L34Route resources may be associated with the same Gateway, and multiple Routes may reference the same backendRef.
                  When multiple Routes match a packet, the Route with the highest priority value is selected.
                  The priority is greater than 0
                format: int32
                minimum: 1
                type: integer
              protocols:
                description: |-
                  Protocols allowed in this L34Route.
                  The protocols should not have overlaps.
                items:
                  type: string
                maxItems: 3
                type: array
                x-kubernetes-validations:
                - message: protocols must not contain duplicates
                  rule: self.all(p, self.exists_one(x, x == p))
              sourceCIDRs:
                description: |-
                  Source CIDRs allowed in the L34Route.
                  The source CIDRs should not have overlaps.
                items:
                  maxLength: 50
                  type: string
                maxItems: 100
                type: array
                x-kubernetes-validations:
                - message: each sourceCIDR must be a valid CIDR
                  rule: self.all(c, isCIDR(c))
              sourcePorts:
                description: |-
                  Source port ranges allowed in the L34Route.
                  The ports should not have overlaps.
                  Ports can be defined by:
                  - a single port, such as 3000;
                  - a port range, such as 3000-4000;
                  - "any", which is equivalent to port range 0-65535.
                items:
                  maxLength: 11
                  type: string
                maxItems: 20
                type: array
                x-kubernetes-validations:
                - message: each sourcePort must be a single port, a port range, or
                    'any'
                  rule: self.all(port, port == 'any' || (port.matches('^\\d+$') &&
                    int(port) >= 0 && int(port) <= 65535) || (port.matches('^\\d+-\\d+$')
                    && int(port.split('-')[0]) >= 0 && int(port.split('-')[0]) <=
                    65535 && int(port.split('-')[1]) >= 0 && int(port.split('-')[1])
                    <= 65535 && int(port.split('-')[0]) <= int(port.split('-')[1])))
            required:
            - destinationCIDRs
            - parentRefs
            - priority
            - protocols
            type: object
          status:
            description: status defines the observed state of L34Route
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
