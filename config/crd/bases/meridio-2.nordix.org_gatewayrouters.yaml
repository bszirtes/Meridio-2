---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: gatewayrouters.meridio-2.nordix.org
spec:
  group: meridio-2.nordix.org
  names:
    kind: GatewayRouter
    listKind: GatewayRouterList
    plural: gatewayrouters
    singular: gatewayrouter
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GatewayRouter is the Schema for the gatewayrouters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GatewayRouter
            properties:
              address:
                description: Address of the Gateway Router
                type: string
                x-kubernetes-validations:
                - message: Must be an ip address
                  rule: isIP(self)
              bgp:
                description: |-
                  Parameters to set up the BGP session to specified Address.
                  If the Protocol is bgp, the minimal parameters to be defined in bgp properties
                  are RemoteASN and LocalASN
                properties:
                  bfd:
                    description: BFD monitoring of BGP session.
                    properties:
                      minRx:
                        description: |-
                          Min-rx timer of bfd session. Please refere to BFD material to understand what this implies.
                          The value must be a valid duration format. For example, 300ms, 90s, 1m, 1h.
                          The duration will be rounded by millisecond.
                        type: string
                      minTx:
                        description: |-
                          Min-tx timer of bfd session. Please refere to BFD material to understand what this implies.
                          The value must be a valid duration format. For example, 300ms, 90s, 1m, 1h.
                          The duration will be rounded by millisecond.
                        type: string
                      multiplier:
                        description: |-
                          Multiplier of bfd session.
                          When this number of bfd packets failed to receive, bfd session will go down.
                        type: integer
                      switch:
                        description: |-
                          BFD monitoring.
                          Valid values are:
                          - false: no BFD monitoring;
                          - true: turns on the BFD monitoring.
                          When left empty, there is no BFD monitoring.
                        type: boolean
                    type: object
                  holdTime:
                    description: |-
                      Hold timer of the BGP session. Please refere to BGP material to understand what this implies.
                      The value must be a valid duration format. For example, 90s, 1m, 1h.
                      The duration will be rounded by second
                      Minimum duration is 3s.
                    type: string
                    x-kubernetes-validations:
                    - message: Must be at least 3s
                      rule: duration(self) >= duration('3s')
                  localASN:
                    description: The ASN number of the system where the Attractor
                      FrontEnds locates
                    format: int32
                    type: integer
                  localPort:
                    default: 179
                    description: BGP listening port of the Attractor FrontEnds.
                    maximum: 65535
                    minimum: 1
                    type: integer
                  remoteASN:
                    description: The ASN number of the Gateway Router
                    format: int32
                    type: integer
                  remotePort:
                    default: 179
                    description: BGP listening port of the Gateway Router.
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - localASN
                - remoteASN
                type: object
              gatewayRef:
                description: |-
                  ParentReference identifies an API object (usually a Gateway) that can be considered
                  a parent of this resource (usually a route). There are two kinds of parent resources
                  with "Core" support:

                  * Gateway (Gateway conformance profile)
                  * Service (Mesh conformance profile, ClusterIP Services only)

                  This API may be extended in the future to support additional kinds of parent
                  resources.

                  The API object must be valid in the cluster; the Group and Kind must
                  be registered in the cluster for this reference to be valid.
                properties:
                  group:
                    default: gateway.networking.k8s.io
                    description: |-
                      Group is the group of the referent.
                      When unspecified, "gateway.networking.k8s.io" is inferred.
                      To set the core API group (such as for a "Service" kind referent),
                      Group must be explicitly set to "" (empty string).

                      Support: Core
                    maxLength: 253
                    pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  kind:
                    default: Gateway
                    description: |-
                      Kind is kind of the referent.

                      There are two kinds of parent resources with "Core" support:

                      * Gateway (Gateway conformance profile)
                      * Service (Mesh conformance profile, ClusterIP Services only)

                      Support for other resources is Implementation-Specific.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                    type: string
                  name:
                    description: |-
                      Name is the name of the referent.

                      Support: Core
                    maxLength: 253
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of the referent. When unspecified, this refers
                      to the local namespace of the Route.

                      Note that there are specific rules for ParentRefs which cross namespace
                      boundaries. Cross-namespace references are only valid if they are explicitly
                      allowed by something in the namespace they are referring to. For example:
                      Gateway has the AllowedRoutes field, and ReferenceGrant provides a
                      generic way to enable any other kind of cross-namespace reference.

                      <gateway:experimental:description>
                      ParentRefs from a Route to a Service in the same namespace are "producer"
                      routes, which apply default routing rules to inbound connections from
                      any namespace to the Service.

                      ParentRefs from a Route to a Service in a different namespace are
                      "consumer" routes, and these routing rules are only applied to outbound
                      connections originating from the same namespace as the Route, for which
                      the intended destination of the connections are a Service targeted as a
                      ParentRef of the Route.
                      </gateway:experimental:description>

                      Support: Core
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  port:
                    description: |-
                      Port is the network port this Route targets. It can be interpreted
                      differently based on the type of parent resource.

                      When the parent resource is a Gateway, this targets all listeners
                      listening on the specified port that also support this kind of Route(and
                      select this Route). It's not recommended to set `Port` unless the
                      networking behaviors specified in a Route must apply to a specific port
                      as opposed to a listener(s) whose port(s) may be changed. When both Port
                      and SectionName are specified, the name and port of the selected listener
                      must match both specified values.

                      <gateway:experimental:description>
                      When the parent resource is a Service, this targets a specific port in the
                      Service spec. When both Port (experimental) and SectionName are specified,
                      the name and port of the selected port must match both specified values.
                      </gateway:experimental:description>

                      Implementations MAY choose to support other parent resources.
                      Implementations supporting other types of parent resources MUST clearly
                      document how/if Port is interpreted.

                      For the purpose of status, an attachment is considered successful as
                      long as the parent resource accepts it partially. For example, Gateway
                      listeners can restrict which Routes can attach to them by Route kind,
                      namespace, or hostname. If 1 of 2 Gateway listeners accept attachment
                      from the referencing Route, the Route MUST be considered successfully
                      attached. If no Gateway listeners accept attachment from this Route,
                      the Route MUST be considered detached from the Gateway.

                      Support: Extended
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  sectionName:
                    description: |-
                      SectionName is the name of a section within the target resource. In the
                      following resources, SectionName is interpreted as the following:

                      * Gateway: Listener name. When both Port (experimental) and SectionName
                      are specified, the name and port of the selected listener must match
                      both specified values.
                      * Service: Port name. When both Port (experimental) and SectionName
                      are specified, the name and port of the selected listener must match
                      both specified values.

                      Implementations MAY choose to support attaching Routes to other resources.
                      If that is the case, they MUST clearly document how SectionName is
                      interpreted.

                      When unspecified (empty string), this will reference the entire resource.
                      For the purpose of status, an attachment is considered successful if at
                      least one section in the parent resource accepts it. For example, Gateway
                      listeners can restrict which Routes can attach to them by Route kind,
                      namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from
                      the referencing Route, the Route MUST be considered successfully
                      attached. If no Gateway listeners accept attachment from this Route, the
                      Route MUST be considered detached from the Gateway.

                      Support: Core
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                required:
                - name
                type: object
              interface:
                description: Name of the interface to reach external gateway
                type: string
            required:
            - address
            - bgp
            - gatewayRef
            - interface
            type: object
          status:
            description: status defines the observed state of GatewayRouter
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the GatewayRouter resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
