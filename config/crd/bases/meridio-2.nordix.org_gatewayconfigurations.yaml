                      DRA must not be null
                    rule: self.type == "NAD" && self.nad != null || self.type == "DRA"
                      && self.dra != null
                maxItems: 10
                type: array
              networkSubnets:
                description: |-
                  networkSubnets identifies the subnet(s) where application endpoint IPs reside.
                  Used by the ENC controller to match secondary interfaces in application Pods
                  and to determine IP family (IPv4/IPv6) for VIP and next-hop assignment.
                  Typically one entry per IP family for dual-stack deployments.
                items:
                  description: NetworkSubnet identifies a network segment where application
                    endpoints are reachable.
                  properties:
                    attachmentType:
                      default: NAD
                      description: |-
                        attachmentType specifies how the network is attached to Pods.
                        Currently only NAD (NetworkAttachmentDefinition) is supported.
                      enum:
                      - NAD
                      - DRA
                      type: string
                    cidrs:
                      description: |-
                        cidrs lists the subnet CIDRs for this network segment (e.g. "192.168.100.0/24").
                        Must not overlap with CIDRs in other NetworkSubnets. Default routes (0.0.0.0/0,
                        ::/0) and IPv6 link-local addresses (fe80::/10) are not allowed.
                      items:
                        type: string
                        x-kubernetes-validations:
                        - message: Must be a valid CIDR notation!
                          rule: isCIDR(self)
                      maxItems: 15
                      minItems: 1
                      type: array
                  required:
                  - attachmentType
                  - cidrs
                  type: object
                maxItems: 2
                minItems: 1
                type: array
              verticalScaling:
                description: |-
                  verticalScaling configures per-container resource requests, limits, and resize
                  policies for the LB Deployment. When omitted, containers use the resources
                  defined in the LB Deployment template.
                properties:
                  containers:
                    description: |-
                      containers lists per-container resource overrides. Each entry targets a
                      container by name in the LB Deployment template.
                    items:
                      description: ContainerArgs defines resource requirements and
                        resize policy for a single container.
                      properties:
                        enforceResources:
                          default: false
                          description: |-
                            enforceResources controls whether the controller manages this container's resources.
                            If true, the controller enforces the resources value on every reconcile.
                            If false, the controller only sets resources on initial creation, allowing
                            VPA or other tools to manage resources afterward.
                          type: boolean
                        name:
                          description: name is the container name in the LB Deployment
                            template to configure.
                          type: string
                        resizePolicy:
                          description: resizePolicy specifies the restart policy for
                            in-place resource resizing per resource type.
                          items:
                            description: ContainerResizePolicy represents resource
                              resize policy for the container.
                            properties:
                              resourceName:
                                description: |-
                                  Name of the resource to which this resource resize policy applies.
                                  Supported values: cpu, memory.
                                type: string
                              restartPolicy:
                                description: |-
                                  Restart policy to apply when specified resource is resized.
                                  If not specified, it defaults to NotRequired.
                                type: string
                            required:
                            - resourceName
                            - restartPolicy
                            type: object
                          type: array
                        resources:
                          description: resources specifies the CPU and memory requests
                            and limits for this container.
                          properties:
                            claims:
                              description: |-
                                Claims lists the names of resources, defined in spec.resourceClaims,
                                that are used by this container.

                                This field depends on the
                                DynamicResourceAllocation feature gate.

                                This field is immutable. It can only be set for containers.
                              items:
                                description: ResourceClaim references one entry in
                                  PodSpec.ResourceClaims.
                                properties:
                                  name:
                                    description: |-
                                      Name must match the name of one entry in pod.spec.resourceClaims of
                                      the Pod where this field is used. It makes that resource available
                                      inside a container.
                                    type: string
                                  request:
                                    description: |-
                                      Request is the name chosen for a request in the referenced claim.
                                      If empty, everything from the claim is made available, otherwise
                                      only the result of this request.
                                    type: string
                                required:
                                - name
                                type: object
                              type: array
                              x-kubernetes-list-map-keys:
                              - name
                              x-kubernetes-list-type: map
                            limits:
                              additionalProperties:
                                anyOf:
                                - type: integer
                                - type: string
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                              description: |-
                                Limits describes the maximum amount of compute resources allowed.
                                More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                              type: object
                            requests:
                              additionalProperties:
                                anyOf:
                                - type: integer
                                - type: string
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                              description: |-
                                Requests describes the minimum amount of compute resources required.
                                If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                                otherwise to an implementation-defined value. Requests cannot exceed Limits.
                                More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                              type: object
                          type: object
                      required:
                      - enforceResources
                      - name
                      type: object
                    type: array
                type: object
            required:
            - horizontalScaling
            - networkAttachments
            - networkSubnets
            type: object
          status:
            description: status defines the observed state of GatewayConfiguration
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the GatewayConfiguration resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
