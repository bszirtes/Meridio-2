    controller-gen.kubebuilder.io/version: v0.20.0
  name: gatewayconfigurations.meridio-2.nordix.org
spec:
  group: meridio-2.nordix.org
  names:
    kind: GatewayConfiguration
    listKind: GatewayConfigurationList
    plural: gatewayconfigurations
    singular: gatewayconfiguration
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GatewayConfiguration is the Schema for the gatewayconfigurations
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GatewayConfiguration
            properties:
              horizontalScaling:
                description: horizontalScaling controls the replica count of the LB
                  Deployment.
                properties:
                  enforceReplicas:
                    default: false
                    description: |-
                      enforceReplicas controls whether the controller manages the replica count.
                      If true, the controller enforces the replicas value on every reconcile.
                      If false, the controller only sets replicas on initial creation, allowing
                      HPA or other autoscalers to manage the count afterward.
                    type: boolean
                  replicas:
                    default: 2
                    description: replicas is the desired number of LB Deployment Pods.
                    minimum: 1
                    type: integer
                required:
                - enforceReplicas
                - replicas
                type: object
              networkAttachments:
                description: |-
                  networkAttachments defines the secondary network interfaces for the LB
                  Deployment managed by the gateway controller. These only affect the LB Pods
                  and have no relation to network attachments on user application Pods.
                items:
                  description: NetworkAttachment defines a secondary network interface
                    for the LB Deployment Pods.
                  properties:
                    description:
                      description: description is a human-readable description of
                        this network attachment.
                      type: string
                    dra:
                      description: dra specifies Dynamic Resource Allocation parameters.
                        Not yet implemented.
                      type: object
                    nad:
                      description: |-
                        nad specifies the NetworkAttachmentDefinition reference and interface name.
                        Required when type is NAD.
                      properties:
                        interface:
                          description: interface is the name to assign to the network
                            interface inside the Pod (e.g. "net1").
                          type: string
                        name:
                          description: name is the name of the NetworkAttachmentDefinition
                            resource.
                          type: string
                        namespace:
                          description: |-
                            namespace is the namespace of the NetworkAttachmentDefinition resource.
                            Defaults to the GatewayConfiguration's namespace if empty.
                          type: string
                      required:
                      - interface
                      - name
                      - namespace
                      type: object
                    type:
                      default: NAD
                      description: type specifies the attachment mechanism. Currently
                        only NAD is supported.
                      enum:
                      - NAD
                      - DRA
                      type: string
                  required:
                  - type
                  type: object
                  x-kubernetes-validations:
