# This rule is not used by the project meridio-2 itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to meridio-2.nordix.org resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: meridio-2
    app.kubernetes.io/managed-by: kustomize
  name: endpointnetworkconfiguration-viewer-role
rules:
- apiGroups:
  - meridio-2.nordix.org
  resources:
  - endpointnetworkconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - meridio-2.nordix.org
  resources:
  - endpointnetworkconfigurations/status
  verbs:
  - get
