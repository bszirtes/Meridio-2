apiVersion: v1
kind: ServiceAccount
metadata:
  name: stateless-load-balancer
  namespace: system
  labels:
    app.kubernetes.io/name: meridio-2
    app.kubernetes.io/component: loadbalancer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stateless-load-balancer
  namespace: system
  labels:
    app.kubernetes.io/name: meridio-2
    app.kubernetes.io/component: loadbalancer
rules:
# LoadBalancer controller watches DistributionGroups, EndpointSlices, and L34Routes
- apiGroups:
  - meridio-2.nordix.org
  resources:
  - distributiongroups
  - l34routes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
# Router controller watches Gateways and GatewayRouters
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - meridio-2.nordix.org
  resources:
  - gatewayrouters
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stateless-load-balancer
  namespace: system
  labels:
    app.kubernetes.io/name: meridio-2
    app.kubernetes.io/component: loadbalancer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stateless-load-balancer
subjects:
- kind: ServiceAccount
  name: stateless-load-balancer
  namespace: system
