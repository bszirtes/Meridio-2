# This rule is not used by the project meridio-2 itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over meridio-2.nordix.org.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: meridio-2
    app.kubernetes.io/managed-by: kustomize
  name: gatewayrouter-admin-role
rules:
- apiGroups:
  - meridio-2.nordix.org
  resources:
  - gatewayrouters
  verbs:
  - '*'
- apiGroups:
  - meridio-2.nordix.org
  resources:
  - gatewayrouters/status
  verbs:
  - get
