# Patch to inject runtime environment variables via Downward API
- op: add
  path: /spec/template/spec/containers/0/env
  value:
  - name: MERIDIO_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  # LB ServiceAccount name (will be replaced by Kustomize with actual prefixed name)
  - name: MERIDIO_LB_SERVICE_ACCOUNT
    value: stateless-load-balancer
