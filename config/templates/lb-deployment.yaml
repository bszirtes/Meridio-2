apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateless-load-balancer
  namespace: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stateless-load-balancer
  template:
    metadata:
      labels:
        app: stateless-load-balancer
    spec:
      serviceAccountName: stateless-load-balancer
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - stateless-load-balancer
            topologyKey: kubernetes.io/hostname
      initContainers:
      - name: sysctl
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          sysctl -w net.ipv4.conf.all.forwarding=1
          sysctl -w net.ipv6.conf.all.forwarding=1
          sysctl -w net.ipv4.fib_multipath_hash_policy=1
          sysctl -w net.ipv6.fib_multipath_hash_policy=1
          sysctl -w net.ipv4.conf.all.rp_filter=0
          sysctl -w net.ipv4.conf.default.rp_filter=0
          sysctl -w net.ipv6.conf.all.accept_dad=0
        securityContext:
          privileged: true
          runAsNonRoot: false
      containers:
      - name: loadbalancer
        image: registry.nordix.org/cloud-native/meridio-2/stateless-load-balancer:latest
        args:
          - run
        env:
        - name: MERIDIO_GATEWAY_NAME
          value:  # to be filled by operator
        - name: MERIDIO_GATEWAY_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
            add:
            - NET_ADMIN  # nftables, netlink routing rules
            - IPC_LOCK   # NFQLB shared memory (mmap MAP_LOCKED)
            - IPC_OWNER  # NFQLB shared memory lifecycle
        volumeMounts:
        - name: lb-run
          mountPath: /var/run/meridio
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - name: router
        image: registry.nordix.org/cloud-native/meridio-2/router:latest
        args:
          - run
        env:
        - name: MERIDIO_GATEWAY_NAME
          value:  # to be filled by operator
        - name: MERIDIO_GATEWAY_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MERIDIO_BIRD_LOG_FILE
          value: /var/log/bird/bird.log
        - name: MERIDIO_BIRD_LOG_FILE_SIZE
          value: "104857600"  # 100 MiB
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
            add:
            - NET_ADMIN       # netlink operations (routes, rules)
            - NET_BIND_SERVICE # BIRD binding to BGP port 179
            - NET_RAW          # BIRD SO_BINDTODEVICE socket option
        volumeMounts:
        - name: bird-run
          mountPath: /run/bird
        - name: bird-etc
          mountPath: /etc/bird
        - name: bird-log
          mountPath: /var/log/bird
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: lb-run
        emptyDir:
          medium: Memory
      - name: bird-run
        emptyDir:
          medium: Memory
      - name: bird-etc
        emptyDir:
          medium: Memory
      - name: bird-log
        emptyDir:
          medium: Memory
