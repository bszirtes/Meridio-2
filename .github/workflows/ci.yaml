---
name: ci

on:
  push:
    branches:
      - "master"
      - "release/**"

  pull_request:

jobs:
  generated-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make generate
      - run: git diff --exit-code

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make lint

  go-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make fmt
      - run: git diff --exit-code

  go-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make vet

  go-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - name: Check for changes in go.mod or go.sum
        run: git diff --exit-code go.mod go.sum || ( echo "Run go mod tidy" && false )

  unit-tests:
    runs-on: ubuntu-latest
    needs: [generated-code, golangci-lint, go-fmt, go-vet, go-mod]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [generated-code, golangci-lint, go-fmt, go-vet, go-mod]
    strategy:
      matrix:
        image:
          - controller-manager
    steps:
      - uses: actions/checkout@v6
      - run: make ${{ matrix.image }} BUILD_STEPS=build

  e2e:
    needs: [unit-tests, build-images]
    if: github.event_name == 'push'
    uses: ./.github/workflows/e2e.yaml
    permissions:
      contents: write
