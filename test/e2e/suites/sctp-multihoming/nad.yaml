---
# Sysctl tuning NAD
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sysctl-tuning
spec:
  config: '{
      "cniVersion": "0.4.0",
      "name": "sysctl-tuning",
      "plugins": [
        {
          "type": "tuning",
          "prevResult": {},
          "sysctl": {
            "net.ipv4.conf.all.forwarding": "1",
            "net.ipv6.conf.all.forwarding": "1",
            "net.ipv4.fib_multipath_hash_policy": "1",
            "net.ipv6.fib_multipath_hash_policy": "1",
            "net.ipv6.conf.all.accept_dad": "0"
          }
        }
      ]
  }'
---
# VLAN 500 NAD for SCTP multihoming path 1
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-500
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 500,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.102.0/24", "exclude": ["169.254.102.150/32"] }
        ]
      }
    }
---
# VLAN 600 NAD for SCTP multihoming path 2
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-600
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 600,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.202.0/24", "exclude": ["169.254.202.150/32"] }
        ]
      }
    }
---
# Internal network 1 (SLLBR ↔ app Pods)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-sctp1
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-sctp1",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.100.0/24" }
            ]
          }
        }
      ]
    }
---
# Internal network 2 (SLLBR ↔ app Pods)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-sctp2
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-sctp2",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.200.0/24" }
            ]
          }
        }
      ]
    }
