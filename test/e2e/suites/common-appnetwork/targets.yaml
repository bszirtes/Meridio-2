---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-b
  labels:
    app: target-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: target-b
  template:
    metadata:
      labels:
        app: target-b
      annotations:
        k8s.v1.cni.cncf.io/networks: app-net-b
    spec:
      serviceAccountName: meridio-2-network-sidecar
      containers:
      - name: example-target
        image: registry.nordix.org/cloud-native/meridio-2/example-target:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
        - |
          /home/example-target/ctraffic -server -address [::]:5000 &
          /home/example-target/ctraffic -server -udp -address [::]:5001 &
          wait
        securityContext:
          runAsNonRoot: true
          runAsUser: 10011
          capabilities:
            drop: ["ALL"]
      - name: network-sidecar
        image: registry.nordix.org/cloud-native/meridio-2/network-sidecar:latest
        imagePullPolicy: IfNotPresent
        args:
        - --pod-name=$(POD_NAME)
        - --pod-namespace=$(POD_NAMESPACE)
        - --pod-uid=$(POD_UID)
        - --log-level=debug
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        securityContext:
          capabilities:
            drop: ["ALL"]
            add: ["NET_ADMIN"]
