---
# Sysctl tuning NAD
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sysctl-tuning
spec:
  config: '{
      "cniVersion": "0.4.0",
      "name": "sysctl-tuning",
      "plugins": [
        {
          "type": "tuning",
          "prevResult": {},
          "sysctl": {
            "net.ipv4.conf.all.forwarding": "1",
            "net.ipv6.conf.all.forwarding": "1",
            "net.ipv4.fib_multipath_hash_policy": "1",
            "net.ipv6.fib_multipath_hash_policy": "1",
            "net.ipv4.conf.all.rp_filter": "0",
            "net.ipv4.conf.default.rp_filter": "0",
            "net.ipv6.conf.all.accept_dad": "0",
            "net.ipv4.fwmark_reflect": "1",
            "net.ipv6.fwmark_reflect": "1"
          }
        }
      ]
  }'
---
# VLAN 300 NAD for gw-b1 BGP peering
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-300
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 300,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.101.0/24", "exclude": ["169.254.101.150/32"] }
        ]
      }
    }
---
# VLAN 400 NAD for gw-b2 BGP peering
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-400
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 400,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.201.0/24", "exclude": ["169.254.201.150/32"] }
        ]
      }
    }
---
# Shared app network for both gw-b1 and gw-b2
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-b
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-b",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.100.0/24" }
            ]
          }
        }
      ]
    }
