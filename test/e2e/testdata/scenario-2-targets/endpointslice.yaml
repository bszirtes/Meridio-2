---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: web-backends-endpoints
  namespace: default
  labels:
    kubernetes.io/service-name: web-backends
    discovery.k8s.io/managed-by: distributiongroup-controller
    meridio-2.nordix.org/distributiongroup: web-backends
addressType: IPv4
endpoints:
- addresses:
  - 10.244.1.10
  conditions:
    ready: true
  zone: "maglev:0"
- addresses:
  - 10.244.1.11
  conditions:
    ready: true
  zone: "maglev:1"
- addresses:
  - 10.244.1.12
  conditions:
    ready: true
  zone: "maglev:2"
ports:
- port: 80
  protocol: TCP
