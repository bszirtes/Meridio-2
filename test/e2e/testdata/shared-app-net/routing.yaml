---
# gw-b1 router (VLAN 300, ASN 8105)
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayRouter
metadata:
  name: gw-b1-router-v4
  namespace: e2e-shared-app-net
spec:
  gatewayRef:
    name: gw-b1
  interface: "vlan-300"
  address: "169.254.101.150"
  bgp:
    localASN: 8105
    remoteASN: 4248829953
    localPort: 10179
    remotePort: 10179
    holdTime: 24s
    bfd:
      switch: true
      minTx: 300ms
      minRx: 300ms
      multiplier: 3
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: L34Route
metadata:
  name: route-b1
  namespace: e2e-shared-app-net
spec:
  parentRefs:
  - name: gw-b1
  backendRefs:
  - group: meridio-2.nordix.org
    kind: DistributionGroup
    name: dg-b1
  destinationCIDRs:
  - "30.0.0.1/32"
  protocols:
  - TCP
  - UDP
  destinationPorts:
  - "5000-5001"
  priority: 100
---
# gw-b2 router (VLAN 400, ASN 8106)
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayRouter
metadata:
  name: gw-b2-router-v4
