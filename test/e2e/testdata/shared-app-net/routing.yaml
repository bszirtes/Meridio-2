spec:
  gatewayRef:
    name: gw-b2
  interface: "vlan-400"
  address: "169.254.201.150"
  bgp:
    localASN: 8106
    remoteASN: 4248829953
    localPort: 10179
    remotePort: 10179
    holdTime: 24s
    bfd:
      switch: true
      minTx: 300ms
      minRx: 300ms
      multiplier: 3
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: L34Route
metadata:
  name: route-b2
  namespace: e2e-shared-app-net
spec:
  parentRefs:
  - name: gw-b2
  backendRefs:
  - group: meridio-2.nordix.org
    kind: DistributionGroup
    name: dg-b2
  destinationCIDRs:
  - "30.0.0.2/32"
  protocols:
  - TCP
  - UDP
  destinationPorts:
  - "5000-5001"
  priority: 100
