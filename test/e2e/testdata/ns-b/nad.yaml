---
# VLAN NAD for BGP peering (router ↔ external gateway)
# VLAN 200: 169.254.200.x/24 + fd00:200::x/64
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-nad
  namespace: e2e-ns-b
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 200,
      "ipam": {
        "type": "static",
        "addresses": [
          { "address": "169.254.200.1/24" },
          { "address": "fd00:200::1/64" }
        ]
      }
    }
---
# Macvlan NAD for application network (SLLBR ↔ app Pods)
# Dual-stack via whereabouts IPAM
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net
  namespace: e2e-ns-b
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-b",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.200.0/24" },
              { "range": "fd00:211::0/120" }
            ]
          }
        }
      ]
    }
