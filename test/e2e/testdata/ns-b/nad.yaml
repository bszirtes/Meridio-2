---
# VLAN 300 NAD for gw-b1 BGP peering
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-300
  namespace: e2e-ns-b
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 300,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.101.0/24", "exclude": ["169.254.101.150/32"] },
          { "range": "fd00:300::/64", "exclude": ["fd00:300::150/128"] }
        ]
      }
    }
---
# VLAN 400 NAD for gw-b2 BGP peering
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-400
  namespace: e2e-ns-b
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 400,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.201.0/24", "exclude": ["169.254.201.150/32"] },
          { "range": "fd00:400::/64", "exclude": ["fd00:400::150/128"] }
        ]
      }
    }
---
# Shared app network for both gw-b1 and gw-b2
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-b
  namespace: e2e-ns-b
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-b",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.100.0/24" },
              { "range": "fd00:111:100::0/120" }
            ]
          }
        }
      ]
    }
