---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayRouter
metadata:
  name: gw-a-router-v4
  namespace: e2e-ns-a
spec:
  gatewayRef:
    name: gw-a
  interface: "vlan-100"
  address: "169.254.100.150"
  bgp:
    localASN: 8103
    remoteASN: 4248829953
    localPort: 10179
    remotePort: 10179
    holdTime: 24s
    bfd:
      switch: true
      minTx: 300ms
      minRx: 300ms
      multiplier: 3
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayRouter
metadata:
  name: gw-a-router-v6
  namespace: e2e-ns-a
spec:
  gatewayRef:
    name: gw-a
  interface: "vlan-100"
  address: "fd00:100::150"
  bgp:
    localASN: 8103
    remoteASN: 4248829953
    localPort: 10179
    remotePort: 10179
    holdTime: 24s
    bfd:
      switch: true
      minTx: 300ms
      minRx: 300ms
      multiplier: 3
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: L34Route
metadata:
  name: route-a
  namespace: e2e-ns-a
spec:
  parentRefs:
  - name: gw-a
  backendRefs:
  - group: meridio-2.nordix.org
    kind: DistributionGroup
    name: dg-a
  destinationCIDRs:
  - "20.0.0.1/32"
  - "2001:db8::1/128"
  protocols:
  - TCP
  - UDP
  destinationPorts:
  - "5000"
  priority: 100
